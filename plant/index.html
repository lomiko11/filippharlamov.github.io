<!DOCTYPE html>
<html>
<head>
    <title>Помоги полить цветок! 🌿</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0fdf4; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { background: #22c55e; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .logo { font-size: 50px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🌿</div>
        <h1>Нужна помощь!</h1>
        <p>Привет! Пожалуйста, полей мой цветок, пока меня нет рядом.</p>
        <br>
        <button onclick="alert('Спасибо! Хозяин получит уведомление (в разработке)')">Я полил(а)! ✅</button>
        <p><small>Или установи приложение "Цветок" в RuStore</small></p>
    </div>

    <script>
        // Логика: если приложение установлено, пытаемся открыть его
        const plantId = window.location.pathname.split('/').pop();
        if (plantId && plantId !== 'plant') {
            console.log("Пытаемся открыть растение:", plantId);
        }
    </script>
</body>
</html>
